name: Deploy to GitHub Pages

# Auto-deploys when `main` is updated. Still manually dispatchable for any
# branch: in the "Run workflow" dialog use the branch dropdown ("Use workflow
# from") to select the branch — that branch is deployed.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; don't cancel a run in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Default checkout uses the branch you selected when dispatching.
      - name: Checkout ${{ github.ref_name }}
        uses: actions/checkout@v5

      # Fail the deploy if the Korean has drifted between the EN/UZ/RU/ID copies
      # of any level (a moved highlight span, a word edited in one file only…).
      - name: Check Korean is in sync across languages
        run: node tools/check-korean-sync.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Static site lives at the repo root.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
